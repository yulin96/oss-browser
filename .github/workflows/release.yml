name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-14
            command: pnpm exec electron-builder --mac dmg --arm64 --x64 --publish never
            artifact: release-macos
            files: |
              dist/*.dmg
              dist/*.zip
              dist/latest-mac.yml
          - name: Windows
            os: windows-latest
            command: pnpm exec electron-builder --win nsis zip --x64 --publish never
            artifact: release-windows
            files: |
              dist/*.exe
              dist/*.zip
              dist/*.blockmap
              dist/latest.yml
          - name: Linux
            os: ubuntu-latest
            command: pnpm exec electron-builder --linux AppImage deb --x64 --publish never
            artifact: release-linux
            files: |
              dist/*.AppImage
              dist/*.deb
              dist/latest-linux.yml

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Verify update configuration
        shell: bash
        env:
          OSS_UPDATE_URL: ${{ vars.OSS_UPDATE_URL }}
        run: test -n "$OSS_UPDATE_URL"

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify tag version
        shell: bash
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          if [ "${GITHUB_REF_NAME}" != "v${PACKAGE_VERSION}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package version v${PACKAGE_VERSION}."
            exit 1
          fi

      - name: Check types
        run: pnpm typecheck

      - name: Lint source
        run: pnpm lint

      - name: Test application
        run: pnpm test

      - name: Compile application
        run: pnpm exec electron-vite build

      - name: Package application
        env:
          OSS_UPDATE_URL: ${{ vars.OSS_UPDATE_URL }}
        run: ${{ matrix.command }}

      - name: Upload packaged files
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.files }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download packaged files
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Upload update files to OSS
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
          OSS_BUCKET: ${{ vars.OSS_BUCKET }}
          OSS_REGION: ${{ vars.OSS_REGION }}
          OSS_ENDPOINT: ${{ vars.OSS_ENDPOINT }}
          OSS_RELEASE_PREFIX: ${{ vars.OSS_RELEASE_PREFIX }}
        run: node scripts/upload-release-to-oss.mjs

      - name: Create release and upload files
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "${GITHUB_REF_NAME}"
          release-assets/*
          --repo "${GITHUB_REPOSITORY}"
          --title "OSS Browser ${GITHUB_REF_NAME}"
          --generate-notes
          --verify-tag
